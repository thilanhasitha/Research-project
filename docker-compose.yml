services:
  backend:
    build: ./backend
    container_name: sentiment_backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: sentiment_frontend
    working_dir: /app
    command: npm run dev
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: sentiment_nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: on-failure

networks:
  default:
    driver: bridge
